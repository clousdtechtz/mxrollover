name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build whenever you push to the main branch
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Updated to Node 24 to fix the warning
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: npm install # Switched to npm install to prevent the crashing
        working-directory: frontend

      - name: Build Application
        run: npm run build
        working-directory: frontend

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist # Points directly to your Vite build output directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
